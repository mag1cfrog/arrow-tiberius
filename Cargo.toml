[workspace]
members = ["."]
resolver = "3"

[workspace.lints.rust]
missing_docs = "deny"

[workspace.lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"

[package]
name = "arrow-tiberius"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
repository = "https://github.com/mag1cfrog/arrow-tiberius"
description = "Apache Arrow and SQL Server bridge through Tiberius"
readme = "README.md"
keywords = ["arrow", "sql-server", "tiberius", "tds"]
categories = ["database"]

[lints]
workspace = true

[lib]
name = "arrow_tiberius"
path = "src/lib.rs"

[dependencies]
snafu = "0.9.0"
